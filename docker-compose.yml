version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: wopseeion-db
    environment:
      POSTGRES_USER: wopseeion
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: wopseeion
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wopseeion']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: wopseeion-app
    environment:
      DATABASE_URL: postgresql://wopseeion:${DB_PASSWORD:-changeme}@db:5432/wopseeion
      NEXT_PUBLIC_GEMINI_API_KEY: ${NEXT_PUBLIC_GEMINI_API_KEY}
      RIOT_API_KEY: ${RIOT_API_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: wopseeion-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
